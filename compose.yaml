services:
    mysql:
        container_name: mysql
        image: mysql:8.4
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: laravel
            MYSQL_USER: laravel
            MYSQL_PASSWORD: laravel
        volumes:
            - mysql_data:/var/lib/mysql

    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - default

    app:
        build: .
        image: projeto-final/backend
        env_file:
            - .env
        environment:
            DB_HOST: mysql
        ports:
            - "8000:8000"
        volumes:
            - .:/app
            - app_storage:/app/storage
        depends_on:
            - mysql
            - mailpit

volumes:
    mysql_data: {}
    app_storage: {}
